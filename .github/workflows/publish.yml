name: Publish to npm

# Publishes the package whenever a version tag (vX.Y.Z) is pushed.
# The tag's version MUST match package.json's version, or the job fails.
# Requires a repository secret named NPM_TOKEN (an npm automation or granular
# token with publish rights to @focusgts/firefly-services-mcp).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # enables npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Mocked integration tests
        run: npm run test:integration:mocked

      - name: Publish to npm (public, with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
